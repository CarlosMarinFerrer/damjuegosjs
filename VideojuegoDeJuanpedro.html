<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Videojuego de Peleas</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: sans-serif;
        }

        #gameWrapper {
            position: relative;
        }

        canvas {
            background: linear-gradient(#4aa, #2a4);
            border: 3px solid #fff;
            image-rendering: pixelated;
        }

        .ui {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
        }

        .bar {
            width: 200px;
            height: 16px;
            border: 2px solid #fff;
            background: #400;
            position: relative;
        }

        .bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: #0f0;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="gameWrapper">
        <canvas id="game" width="640" height="360"></canvas>
        <div class="ui">
            <div>
                P1
                <div class="bar">
                    <div id="hp1" class="bar-fill"></div>
                </div>
            </div>
            <div>
                P2
                <div class="bar">
                    <div id="hp2" class="bar-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const gravity = 0.6;
        const floorY = 280;

        class Fighter {
            constructor(options) {
                this.x = options.x;
                this.y = options.y;
                this.width = 40;
                this.height = 80;
                this.color = options.color;
                this.facing = options.facing;
                this.speed = 4;
                this.vx = 0;
                this.vy = 0;
                this.onGround = false;
                this.isAttacking = false;
                this.attackTimer = 0;
                this.attackDuration = 12;
                this.hp = 100;
                this.maxHp = 100;
                this.controls = options.controls;
            }

            getHitbox() {
                return {
                    x: this.x,
                    y: this.y,
                    w: this.width,
                    h: this.height
                };
            }

            getAttackBox() {
                if (!this.isAttacking) return null;
                const range = 30;
                return {
                    x: this.facing === 1 ? this.x + this.width : this.x - range,
                    y: this.y + 20,
                    w: range,
                    h: 20
                };
            }

            update(input) {
                this.vx = 0;
                if (input[this.controls.left]) {
                    this.vx = -this.speed;
                    this.facing = -1;
                }
                if (input[this.controls.right]) {
                    this.vx = this.speed;
                    this.facing = 1;
                }

                if (input[this.controls.jump] && this.onGround) {
                    this.vy = -12;
                    this.onGround = false;
                }

                if (input[this.controls.attack] && !this.isAttacking) {
                    this.isAttacking = true;
                    this.attackTimer = this.attackDuration;
                }

                this.x += this.vx;
                this.vy += gravity;
                this.y += this.vy;

                if (this.y + this.height >= floorY) {
                    this.y = floorY - this.height;
                    this.vy = 0;
                    this.onGround = true;
                }

                if (this.x < 20) this.x = 20;
                if (this.x + this.width > canvas.width - 20)
                    this.x = canvas.width - 20 - this.width;

                if (this.isAttacking) {
                    this.attackTimer--;
                    if (this.attackTimer <= 0) {
                        this.isAttacking = false;
                    }
                }
            }

            draw() {
                ctx.fillStyle = "rgba(0,0,0,0.4)";
                ctx.beginPath();
                ctx.ellipse(
                    this.x + this.width / 2,
                    floorY + 5,
                    this.width / 2,
                    10,
                    0,
                    0,
                    Math.PI * 2
                );
                ctx.fill();

                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);

                ctx.fillStyle = "#ffe0b2";
                ctx.fillRect(this.x + 8, this.y - 20, 24, 20);

                if (this.isAttacking) {
                    const atk = this.getAttackBox();
                    if (atk) {
                        ctx.fillStyle = "#ff0";
                        ctx.fillRect(atk.x, atk.y, atk.w, atk.h);
                    }
                }
            }
        }

        const input = {};
        window.addEventListener("keydown", (e) => {
            input[e.key] = true;
        });
        window.addEventListener("keyup", (e) => {
            input[e.key] = false;
        });

        const player1 = new Fighter({
            x: 120,
            y: floorY - 80,
            color: "#3cf",
            facing: 1,
            controls: {
                left: "a",
                right: "d",
                jump: "w",
                attack: "s"
            }
        });

        const player2 = new Fighter({
            x: 480,
            y: floorY - 80,
            color: "#f36",
            facing: -1,
            controls: {
                left: "ArrowLeft",
                right: "ArrowRight",
                jump: "ArrowUp",
                attack: "ArrowDown"
            }
        });

        const hp1Bar = document.getElementById("hp1");
        const hp2Bar = document.getElementById("hp2");

        function rectsOverlap(a, b) {
            return (
                a.x < b.x + b.w &&
                a.x + a.w > b.x &&
                a.y < b.y + b.h &&
                a.y + a.h > b.y
            );
        }

        function updateHealthBars() {
            hp1Bar.style.width = (player1.hp / player1.maxHp) * 100 + "%";
            hp2Bar.style.width = (player2.hp / player2.maxHp) * 100 + "%";

            hp1Bar.style.background = player1.hp < 30 ? "#f00" : "#0f0";
            hp2Bar.style.background = player2.hp < 30 ? "#f00" : "#0f0";
        }

        function drawBackground() {
            // Suelo
            ctx.fillStyle = "#3b2";
            ctx.fillRect(0, floorY, canvas.width, canvas.height - floorY);
            ctx.fillStyle = "#222";
            ctx.fillRect(0, floorY - 40, canvas.width, 10);
            ctx.fillStyle = "#555";
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.fillRect(i, floorY - 40, 20, 10);
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();

            player1.update(input);
            player2.update(input);

            const atk1 = player1.getAttackBox();
            const atk2 = player2.getAttackBox();

            if (atk1 && rectsOverlap(atk1, player2.getHitbox())) {
                player2.hp = Math.max(0, player2.hp - 2);
            }
            if (atk2 && rectsOverlap(atk2, player1.getHitbox())) {
                player1.hp = Math.max(0, player1.hp - 2);
            }

            updateHealthBars();

            player1.draw();
            player2.draw();

            if (player1.hp <= 0 || player2.hp <= 0) {
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = "40px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(
                    player1.hp <= 0 ? "P2 WINS" : "P1 WINS",
                    canvas.width / 2,
                    canvas.height / 2
                );
                ctx.font = "18px sans-serif";
                ctx.fillText(
                    "Pulsa R para reiniciar",
                    canvas.width / 2,
                    canvas.height / 2 + 40
                );

                if (input["r"] || input["R"]) {
                    player1.hp = player1.maxHp;
                    player2.hp = player2.maxHp;
                }
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>

</html>
